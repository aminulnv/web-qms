    <style>
        :root {
            /* Primary Colors */
            --primary-green: #1A733E;
            --primary-green-dark: #124F2A;
            --primary-green-light: #E0FFB3;
            
            /* Background Colors */
            --bg-main: #F8F7F2;
            --bg-dark: #1A733E;
            --bg-white: #ffffff;
            
            /* Text Colors */
            --text-primary: #000000;
            --text-secondary: #333333;
            --text-light: #E0FFB3;
            --text-muted: #A0A0A0;
            
            /* Border Colors */
            --border-light: #D1D1D1;
            --border-focus: #1A733E;
            
            /* Interactive Colors */
            --button-primary: #124F2A;
            --button-primary-hover: #1A733E;
            --link-color: #1A733E;
            --link-hover: #124F2A;
            
            /* Responsive Spacing - Using clamp() for fluid scaling */
            --spacing-xs: clamp(0.25rem, 0.5vw, 0.5rem);
            --spacing-sm: clamp(0.5rem, 1vw, 1rem);
            --spacing-md: clamp(0.75rem, 1.5vw, 1.5rem);
            --spacing-lg: clamp(1rem, 2vw, 2rem);
            --spacing-xl: clamp(1.5rem, 3vw, 3rem);
            --spacing-xxl: clamp(2rem, 4vw, 4rem);
            
            /* Font Sizes - Original sizes maintained */
            --font-xs: 0.7rem;
            --font-sm: 0.8rem;
            --font-base: 0.9rem;
            --font-md: 1rem;
            --font-lg: 1.1rem;
            --font-xl: 1.2rem;
            --font-2xl: 1.3rem;
            --font-3xl: 1.4rem;
            --font-4xl: 1.5rem;
            --font-5xl: 1.6rem;
            --font-6xl: 2rem;
            --font-7xl: 2.5rem;
            --font-8xl: 3rem;
            --font-9xl: 3.5rem;
            --font-10xl: 4rem;
            --font-11xl: 4.5rem;
            --font-12xl: 5rem;
            --font-13xl: 5.5rem;
            
            /* Responsive Border Radius */
            --radius-sm: clamp(0.125rem, 0.25vw, 0.375rem);
            --radius-md: clamp(0.25rem, 0.375vw, 0.5rem);
            --radius-lg: clamp(0.375rem, 0.5vw, 0.75rem);
            
            /* Transitions */
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            
            /* Responsive Layout Units */
            --container-padding: clamp(1rem, 3vw, 3.75rem);
            --form-max-width: clamp(18rem, 25vw, 20rem);
            --logo-size: clamp(4rem, 6vw, 6.25rem);
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container { 
            display: flex; 
            height: 100vh; 
            min-height: 100vh;
        }
        
        /* Left Panel */
        .left-panel {
            background-color: var(--bg-dark);
            flex: 0 0 70%;
            display: flex;
            flex-direction: column;
            padding: var(--container-padding) var(--container-padding) 0 var(--container-padding);
            position: relative;
        }
        
        .main-content { 
            margin-bottom: var(--spacing-xxl); 
            text-align: left;
        }
        
        .main-heading {
            color: var(--text-light);
            font-size: var(--font-12xl);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: clamp(-0.125rem, -0.1875vw, -0.1875rem);
            text-align: left;
        }
        
        .sub-heading {
            color: var(--text-light);
            font-size: var(--font-md);
            font-weight: 400;
            text-align: left;
        }
        
        .branding {
            position: absolute;
            bottom: var(--spacing-xxl);
            left: var(--container-padding);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        
        .logo {
            width: var(--logo-size);
            height: auto;
            object-fit: contain;
            margin-left: 0;
        }
        
        .quality-control {
            color: var(--text-light);
            font-size: var(--font-4xl);
            font-weight: 700;
            text-align: left;
            margin-left: var(--spacing-xs);
        }
        
        /* Right Panel */
        .right-panel {
            background-color: var(--bg-main);
            flex: 0 0 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--container-padding);
        }
        
        .login-form { 
            width: 100%; 
            max-width: var(--form-max-width); 
        }
        
        .login-heading {
            color: var(--text-primary);
            font-size: var(--font-5xl);
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5625rem;
        }
        
        .form-group { 
            margin-bottom: 0.9375rem; 
        }
        
        .form-label {
            color: var(--text-primary);
            font-size: var(--font-sm);
            font-weight: 500;
            margin-bottom: 0.375rem;
            display: block;
        }
        
        .form-input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background-color: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: var(--font-base);
            transition: border-color var(--transition-normal);
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--border-focus);
        }
        
        .form-input::placeholder { color: var(--text-muted); }
        
        .login-button {
            width: 100%;
            padding: 0.625rem;
            background-color: var(--button-primary);
            color: var(--bg-white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: var(--font-base);
            font-weight: 600;
            letter-spacing: 0.0625rem;
            cursor: pointer;
            transition: background-color var(--transition-normal);
            margin-bottom: 0.9375rem;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .login-button:hover { background-color: var(--button-primary-hover); }
        
        .forgot-password {
            color: var(--link-color);
            text-decoration: none;
            font-size: var(--font-xs);
            text-align: center;
            display: block;
            transition: color var(--transition-normal);
        }
        
        .forgot-password:hover { color: var(--link-hover); }
        
        /* Google Sign-In Button Styles */
        .google-signin-container {
            margin-bottom: var(--spacing-lg);
            margin-top: var(--spacing-sm);
            text-align: center;
        }
        
        .google-signin-button {
            width: 100%;
            padding: 0.625rem;
            background-color: var(--bg-white);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-size: var(--font-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .google-signin-button:hover {
            background-color: #f8f9fa;
            border-color: var(--border-focus);
            box-shadow: 0 clamp(0.0625rem, 0.125vw, 0.125rem) clamp(0.125rem, 0.25vw, 0.25rem) rgba(0,0,0,0.1);
        }
        
        .google-signin-button:active {
            transform: translateY(clamp(0.03125rem, 0.0625vw, 0.0625rem));
        }
        
        .google-icon {
            width: 1.125rem;
            height: 1.125rem;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgiIGhlaWdodD0iMTgiIHZpZXdCb3g9IjAgMCAxOCAxOCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPgogICAgPHBhdGggZD0iTTE3LjY0IDkuMjA0NTVjMC0uNjM5NTQtLjA1NzMtMS4yNTI3My0uMTY0MS0xLjg0MDkxSDl2My40ODE4aDQuODQ1NWMtLjIwNjQgMS4xMjU0NS0uODQ1NSAyLjA3OTktMS44NDA5IDIuNzE0NXYyLjI1ODhoMi45NTQ1YzIuNzE0NS0yLjQ5MDkgNC4yNzI3LTYuMTU0NSA0LjI3MjctMTAuNjEzNnoiIGZpbGw9IiM0Mjg1RjQiLz4KICAgIDxwYXRoIGQ9Ik05IDE4YzIuNDkwOSAwIDQuNTc3My0uODIwNSA2LjEwNDUtMi4yMjI3bC0yLjk1NDUtMi4yNThjLS44MjA1LjU0NzMtMS44OTU1Ljg3MjctMy4xNS44NzI3LTIuNDA5MSAwLTQuNDU0NS0xLjc0NTUtNS4yNzI3LTQuMDkwOS01LjI3MjctLjY4MTgtMC0xLjMxODEuMTM2NC0xLjkwOTEuMzYzNnYtMi44NDU1aC0yLjk1NDVjMS44MjczIDEuNjM2NCAyLjk1NDUgNC4wOTA5IDIuOTU0NSA2LjgxODJzLTEuMTI3MyA1LjE4MTgtMi45NTQ1IDYuODE4MmgzLjA0NTV6IiBmaWxsPSIjMzRBODUzIi8+CiAgICA8cGF0aCBkPSJNMS4zNjM2NCA1LjM2MzY0Yy0uNDU0NTUuNjgxODItLjY4MTgyIDEuNDU0NTUtLjY4MTgyIDIuMjcyNzMgMCAuODE4MTguMjI3MjcgMS41OTA5LjY4MTgyIDIuMjcyNzNsLTIuMDQ1NDUgMS41NDU0NXYuMDA0NTVjLTEuMzYzNjQtMi4wNDU0NS0yLjA0NTQ1LTQuNDA5MDktMi4wNDU0NS02LjgxODIgMC0yLjQwOTEuNjgxODItNC43NzI3MyAyLjA0NTQ1LTYuODE4MmwzLjA0NTQ1IDIuMjcyNzN6IiBmaWxsPSIjRkJCQzA1Ii8+CiAgICA8cGF0aCBkPSJNOSAxLjYzNjM2YzEuMzE4MTggMCAyLjQ5MDkxLjQ1NDU1IDMuNDA5MDkgMS4yNzI3M2wtMi41NDU0NSAyLjU0NTQ1Yy0uNzI3MjctLjQzNjM2LTEuNjM2MzYtLjY4MTgyLTIuODYzNjQtLjY4MTgyLTIuNDA5MSAwLTQuNDU0NTUgMS43NDU0NS01LjI3MjczIDQuMDkwOTFsLTMuMDQ1NDUtMi4yNzI3M2MxLjUyNzI3LTMuMDQ1NDUgNC41NDU0NS01LjA5MDkxIDguMzYzNjQtNS4wOTA5MXoiIGZpbGw9IiNFQjQzMzUiLz4KICA8L2c+Cjwvc3ZnPgo=');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: var(--spacing-lg) 0;
            color: var(--text-muted);
            font-size: var(--font-sm);
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: clamp(0.03125rem, 0.0625vw, 0.0625rem);
            background-color: var(--border-light);
        }
        
        .divider span {
            padding: 0 var(--spacing-sm);
            background-color: var(--bg-main);
        }
        
        /* Reset Password Form Styles */
        .reset-form {
            display: none;
        }
        
        .reset-form.active {
            display: block;
        }
        
        .login-form.hidden {
            display: none;
        }
        
        .back-to-login {
            color: var(--link-color);
            text-decoration: none;
            font-size: var(--font-xs);
            text-align: center;
            display: block;
            transition: color var(--transition-normal);
            margin-top: 0.9375rem;
        }
        
        .back-to-login:hover {
            color: var(--link-hover);
        }
        
        .reset-text {
            color: var(--text-secondary);
            font-size: var(--font-sm);
            text-align: center;
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }
        
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid #c3e6cb;
            margin-bottom: 1.25rem;
            font-size: var(--font-sm);
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid #f5c6cb;
            margin-bottom: 1.25rem;
            font-size: var(--font-sm);
        }
        
        /* Responsive Breakpoints */
        
        /* Large screens (1200px and up) */
        @media (min-width: 75rem) {
            .container {
                max-width: 120rem;
                margin: 0 auto;
            }
            
            .left-panel {
                flex: 0 0 65%;
            }
            
            .right-panel {
                flex: 0 0 35%;
            }
        }
        
        /* Medium screens (768px to 1199px) */
        @media (max-width: 74.9375rem) and (min-width: 48rem) {
            .left-panel {
                flex: 0 0 60%;
                padding: var(--spacing-lg);
            }
            
            .right-panel {
                flex: 0 0 40%;
                padding: var(--spacing-lg);
            }
            
            .main-heading {
                font-size: var(--font-12xl);
            }
        }
        
        /* Small screens (480px to 767px) */
        @media (max-width: 47.9375rem) and (min-width: 30rem) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            
            .left-panel {
                flex: none;
                min-height: 40vh;
                padding: var(--spacing-lg);
                text-align: center;
            }
            
            .right-panel {
                flex: none;
                min-height: 60vh;
                padding: var(--spacing-lg);
            }
            
            .main-heading {
                font-size: var(--font-12xl);
            }
            
            .branding {
                position: static;
                margin-top: var(--spacing-lg);
                align-items: center;
            }
        }
        
        /* Extra small screens (below 480px) */
        @media (max-width: 29.9375rem) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            
            .left-panel {
                flex: none;
                min-height: 35vh;
                padding: var(--spacing-md);
                text-align: center;
            }
            
            .right-panel {
                flex: none;
                min-height: 65vh;
                padding: var(--spacing-md);
            }
            
            .main-heading {
                font-size: var(--font-12xl);
            }
            
            .branding {
                position: static;
                margin-top: var(--spacing-md);
                align-items: center;
            }
            
            .logo {
                width: clamp(3rem, 8vw, 4rem);
            }
        }
        
        
        /* Landscape orientation adjustments */
        @media (orientation: landscape) and (max-height: 30rem) {
            .container {
                flex-direction: row;
            }
            
            .left-panel {
                flex: 0 0 50%;
                min-height: 100vh;
            }
            
            .right-panel {
                flex: 0 0 50%;
                min-height: 100vh;
            }
            
            .main-heading {
                font-size: var(--font-12xl);
            }
        }
        
        
        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .logo { image-rendering: -webkit-optimize-contrast; }
        }
        
        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Print styles */
        @media print {
            .container { flex-direction: column; }
            .left-panel, .right-panel { 
                flex: none; 
                padding: 20px; 
            }
            .main-heading { color: var(--text-primary); }
            .sub-heading { color: var(--text-secondary); }
            .quality-control { color: var(--text-primary); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="main-content">
                <h1 class="main-heading">Every Detail<br>Matters.</h1>
                <p class="sub-heading">The Art of Perfection Begins Here</p>
            </div>
            <div class="branding">
                <img src="https://careers.recruiteecdn.com/image/upload/production/images/BpRN/wCefCTnrj5fG.png" alt="NEXT VENTURES Logo" class="logo">
                <div class="quality-control">Quality Management System</div>
            </div>
        </div>
        
        <div class="right-panel">
            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <h2 class="login-heading">Login to continue</h2>
                
                <!-- Google Sign-In (Primary Method) -->
                <div class="google-signin-container">
                    <div id="g_id_onload"
                         data-client_id="301636443575-ksrlhnk2bo0d7ikum000tb8b9g081rpp.apps.googleusercontent.com"
                         data-callback="handleGoogleSignIn"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin"
                         data-type="standard"
                         data-size="large"
                         data-theme="outline"
                         data-text="sign_in_with"
                         data-shape="rectangular"
                         data-logo_alignment="left">
                    </div>
                </div>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <!-- Email/Password Login (Secondary Method) -->
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="email@nextventures.io" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-button">LOGIN</button>
                <a href="#" class="forgot-password" id="forgotPasswordLink">Forgot your password?</a>
            </form>
            
            <!-- Reset Password Form -->
            <form class="reset-form" id="resetForm">
                <h2 class="login-heading">Reset Password</h2>
                <p class="reset-text">Enter your email address and we'll send you a link to reset your password.</p>
                
                <div id="messageContainer"></div>
                
                <div class="form-group">
                    <label for="resetEmail" class="form-label">Email Address</label>
                    <input type="email" id="resetEmail" class="form-input" placeholder="Enter your email address" required>
                </div>
                <button type="submit" class="login-button" id="submitReset">Send Reset Link</button>
                <a href="#" class="back-to-login" id="backToLogin">Back to Login</a>
            </form>
        </div>
    </div>


    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const inputs = document.querySelectorAll('.form-input');
        
        // Form validation and submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (!email.endsWith('@nextventures.io')) {
                alert('Please use a valid @nextventures.io email address');
                return;
            }
            
            if (password !== 'admin') {
                alert('Invalid password. Please try again.');
                return;
            }
            
            console.log('Login successful:', { email, password });
            
            // Store user information in localStorage for use in home.html
            const userInfo = {
                name: email.split('@')[0], // Extract username from email
                email: email,
                picture: null, // No picture for regular login
                sub: 'admin-user' // Identifier for admin user
            };
            
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            console.log('User info stored:', userInfo);
            
            window.location.href = 'home.html';
        });
        
        // Auto-append domain to email
        emailInput.addEventListener('blur', function() {
            if (this.value && !this.value.includes('@')) {
                this.value += '@nextventures.io';
            }
        });
        
        // Input focus effects
        inputs.forEach(input => {
            input.addEventListener('focus', () => input.style.borderColor = '#1A733E');
            input.addEventListener('blur', () => {
                if (!input.value) input.style.borderColor = '#D1D1D1';
            });
        });
        
        // Panel switching functionality
        const loginForm = document.getElementById('loginForm');
        const resetForm = document.getElementById('resetForm');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const backToLoginLink = document.getElementById('backToLogin');
        const resetEmailInput = document.getElementById('resetEmail');
        const submitResetBtn = document.getElementById('submitReset');
        const messageContainer = document.getElementById('messageContainer');

        // Switch to reset password form
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('hidden');
            resetForm.classList.add('active');
            resetEmailInput.focus();
            clearMessages();
        });

        // Switch back to login form
        backToLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            resetForm.classList.remove('active');
            loginForm.classList.remove('hidden');
            clearMessages();
        });

        // Clear messages function
        function clearMessages() {
            messageContainer.innerHTML = '';
        }

        // Show message function
        function showMessage(message, type) {
            clearMessages();
            const messageDiv = document.createElement('div');

        // Reset password form submission
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = resetEmailInput.value.trim();
            
            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }

            // Validate @nextventures.io domain
            if (!email.endsWith('@nextventures.io')) {
                showMessage('Please use a valid @nextventures.io email address.', 'error');
                return;
            }

            // Disable submit button and show loading state
            submitResetBtn.disabled = true;
            submitResetBtn.textContent = 'Sending...';

            try {
                // Simulate API call (replace with actual implementation)
                await simulatePasswordReset(email);
                
                showMessage('Password reset link has been sent to your email address. Please check your inbox.', 'success');
                
                // Reset form and switch back to login after 3 seconds
                setTimeout(() => {
                    resetForm.reset();
                    resetForm.classList.remove('active');
                    loginForm.classList.remove('hidden');

                }, 3000);

        function handleGoogleSignIn(response) {

            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            console.log('User info:', payload);
            
            // Extract user information
            const userInfo = {
                email: payload.email,
                name: payload.name,
                picture: payload.picture,
                sub: payload.sub
            };
            
            // Validate email domain (optional - remove if you want to allow any Google account)
            if (userInfo.email && userInfo.email.endsWith('@nextventures.io')) {

                // Store user information in localStorage for use in home.html
                localStorage.setItem('userInfo', JSON.stringify({

                    picture: userInfo.picture,
